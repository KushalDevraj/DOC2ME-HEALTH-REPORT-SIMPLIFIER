<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc 2 Me - Expert Review</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body,
        html {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 100% 0%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .navbar-custom {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            margin: 0 10px;
        }

        .nav-link.active {
            color: var(--primary) !important;
        }

        .main-container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .content-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 1rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .review-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .review-header {
            background: rgba(34, 197, 94, 0.05);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(34, 197, 94, 0.1);
        }

        .review-header h5 {
            margin: 0;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .review-body {
            padding: 2.5rem;
        }

        .output-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .edit-area {
            width: 100%;
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid var(--primary);
            margin-bottom: 2rem;
            font-family: inherit;
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .action-bar {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn {
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-approve:hover {
            background: var(--primary-dark);
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.2);
            transform: translateY(-2px);
            color: white;
        }

        .btn-edit {
            background: white;
            color: var(--text-muted);
            border: 1px solid #e2e8f0;
        }

        .btn-edit:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-save {
            background: var(--primary-dark);
            color: white;
            border: none;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Doc 2 Me</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Home<span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Report</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jargon">Expert Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/text">Text</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">Chat</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="main-container">
        <div class="content-card">
            <div class="header">
                <i class="fas fa-stethoscope" style="font-size: 4rem; color: var(--primary);"></i>
                <h1>Expert Review</h1>
                <p>Ensure accuracy by reviewing or refining the AI-generated results.</p>
            </div>

            <div class="review-card">
                <div class="review-header">
                    <h5>Original Query: {{ data.input }}</h5>
                </div>
                <div class="review-body">
                    <div id="card-text" class="output-text">{{ data.output }}</div>
                    <textarea id="edit-text" class="edit-area" rows="6" style="display: none;"></textarea>

                    <div class="action-bar">
                        <button id="approve-btn" class="btn btn-approve" onclick="handleAction('approve')">
                            <i class="fas fa-check mr-2"></i> Approve
                        </button>
                        <button id="edit-btn" class="btn btn-edit" onclick="editText()">
                            <i class="fas fa-edit mr-2"></i> Edit
                        </button>
                        <button id="save-btn" class="btn btn-save" style="display: none;"
                            onclick="handleAction('save')">
                            <i class="fas fa-save mr-2"></i> Save Changes
                        </button>
                    </div>
                </div>
                <div id="feedback_uuid" style="display: none;">{{ data.uuid}}</div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        function editText() {
            document.getElementById('card-text').style.display = 'none';
            document.getElementById('edit-text').style.display = 'block';
            document.getElementById('edit-text').value = document.getElementById('card-text').innerText;
            document.getElementById('approve-btn').style.display = 'none';
            document.getElementById('edit-btn').style.display = 'none';
            document.getElementById('save-btn').style.display = 'block';
        }

        function handleAction(action) {
            const text = action === 'save' ? document.getElementById('edit-text').value : document.getElementById('card-text').innerText;
            const uuid = document.getElementById('feedback_uuid').innerText;

            const data = {
                action: action === 'save' ? 'approve' : action,
                feedback: text,
                uuid: uuid
            };
            const jsonData = JSON.stringify(data);
            $.ajax({
                url: '/feedback',
                type: 'POST',
                contentType: 'application/json',  // Set content type to JSON
                data: jsonData,  // Send JSON data
                success: function (response) {
                    if (response.status === 'approved') {
                        alert('Text approved successfully');
                        document.getElementById('card-text').innerText = text;
                        document.getElementById('card-text').style.display = 'block';
                        document.getElementById('edit-text').style.display = 'none';
                        document.getElementById('approve-btn').style.display = 'block';
                        document.getElementById('edit-btn').style.display = 'block';
                        document.getElementById('save-btn').style.display = 'none';
                    } else if (response.status === 'edit') {
                        editText();
                    }
                    window.location.reload();
                },
                error: function (jqXHR, textStatus, errorThrown) {
                    console.error('Request failed:', textStatus, errorThrown);
                    alert('Failed to send request. Please try again.');
                }
            });
        }
    </script>
</body>

</html>
