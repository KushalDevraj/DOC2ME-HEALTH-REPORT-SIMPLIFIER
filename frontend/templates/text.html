<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc 2 Me - Text Simplifier</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body,
        html {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 100%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .navbar-custom {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            margin: 0 10px;
        }

        .nav-link.active {
            color: var(--primary) !important;
        }

        .main-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .content-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-control {
            border-radius: 16px;
            padding: 1rem 1.5rem;
            border: 2px solid transparent;
            background: rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-control:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
            transition: all 0.3s ease;
            margin-top: 1.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.3);
        }

        .result-container {
            margin-top: 3rem;
            padding: 2rem;
            background: white;
            border-radius: 24px;
            text-align: left;
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Doc 2 Me</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Home<span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Report</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jargon">Expert Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/text">Text</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">Chat</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="content-card">
            <div class="header">
                <h1>Text Simplifier</h1>
                <p>Paste medical jargon or complex terms to get an instant explanation.</p>
            </div>
            <form id="upload-form">
                <div class="form-group">
                    <textarea class="form-control" id="medical-text" rows="4"
                        placeholder="e.g., Patient presents with idiopathic pulmonary fibrosis..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Simplify Text</button>
            </form>

            <div id="result-container" class="result-container" style="display: none;">
                <h4><i class="fas fa-magic mr-2 text-success"></i> Simplified Explanation</h4>
                <hr>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 font-weight-bold">Simplifying...</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        document.getElementById('upload-form').addEventListener('submit', async function (event) {
            event.preventDefault();
            const medicalText = document.getElementById('medical-text').value.trim();
            if (medicalText === '') {
                alert("Please enter some medical text.");
            } else {
                try {
                    // Show loading overlay
                    document.getElementById('loading-overlay').style.display = 'flex';

                    // Send the medical text to the backend
                    const response = await fetch('/upload-text/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ medical_text: medicalText }),
                    });

                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }

                    const responseData = await response.json();
                    const simplifiedText = responseData.simplified_text;

                    // Display the simplified text in the result container
                    document.getElementById('result-container').style.display = 'block';
                    document.getElementById('result').innerHTML = simplifiedText;
                } catch (error) {
                    console.error('Error:', error);
                    // Handle errors, e.g., display an error message on your webpage
                    alert('Error: ' + error.message);
                } finally {
                    // Hide loading overlay
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            }
        });
    </script>
</body>

</html>
