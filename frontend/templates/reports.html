<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc 2 Me - Report Simplifier</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body,
        html {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .navbar-custom {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            margin: 0 10px;
        }

        .nav-link.active {
            color: var(--primary) !important;
        }

        .main-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .content-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            padding: 3rem;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .upload-zone {
            border: 2px dashed rgba(34, 197, 94, 0.2);
            padding: 3rem;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(34, 197, 94, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(34, 197, 94, 0.3);
        }

        .result-container {
            margin-top: 3rem;
            padding: 2rem;
            background: white;
            border-radius: 24px;
            text-align: left;
            border-left: 5px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .result-container h4 {
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Doc 2 Me</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Home<span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Report</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jargon">Expert Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/text">Text</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">Chat</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="content-card">
            <div class="header">
                <h1>Report Simplifier</h1>
                <p>Upload your medical report and let AI handle the complexity.</p>
            </div>
            <form id="upload-form" enctype="multipart/form-data">
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h5>Click or Drag File Here</h5>
                    <p class="text-muted">Supports PDF and Images</p>
                    <input type="file" id="file-input" style="display: none;" accept=".pdf,image/*" required>
                </div>
                <button type="submit" class="btn btn-primary">Simplify My Report</button>
            </form>

            <div id="result-container" class="result-container" style="display: none;">
                <h4><i class="fas fa-magic mr-2 text-success"></i> Simplified Explanation</h4>
                <hr>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="text-center">
            <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
            <p class="mt-3 font-weight-bold">Analyzing your report...</p>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        const dropZone = document.querySelector('.upload-zone');
        const fileInput = document.getElementById('file-input');
        const dropZoneText = dropZone.querySelector('h5');

        // Handle file selection via click
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                dropZoneText.textContent = e.target.files[0].name;
                dropZone.style.borderColor = 'var(--primary)';
                dropZone.style.background = 'rgba(34, 197, 94, 0.05)';
            } else {
                dropZoneText.textContent = 'Click or Drag File Here';
                dropZone.style.borderColor = '';
                dropZone.style.background = '';
            }
        });

        // Prevent default drag behaviors
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Highlight drop zone when item is dragged over it
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'rgba(34, 197, 94, 0.1)';
        }

        function unhighlight(e) {
            if (fileInput.files.length === 0) {
                dropZone.style.borderColor = '';
                dropZone.style.background = '';
            } else {
                dropZone.style.background = 'rgba(34, 197, 94, 0.05)';
            }
        }

        // Handle dropped files
        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;

            if (files.length > 0) {
                fileInput.files = files; // Assign files to the input
                
                // Trigger change event to update UI
                const event = new Event('change');
                fileInput.dispatchEvent(event);
            }
        }

        const uploadFile = async (fileInput) => {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // Show loading overlay
                $('#loading-overlay').show();

                const response = await fetch('/upload-pdf/', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                const simplifiedText = data.simplified_text;
                console.log('Simplified text:', simplifiedText);

                document.getElementById('result-container').style.display = 'block';
                document.getElementById('result').innerHTML = simplifiedText;
            } catch (error) {
                console.error('Error:', error);
                let errorMessage = error.message;
                if (error.response) {
                    errorMessage += ' (Status: ' + error.response.status + ')';
                }
                alert('Error: ' + errorMessage + '\nPlease check if the file is a valid PDF or Image and that the backend is running.');
            } finally {
                // Hide loading overlay after response is received
                $('#loading-overlay').hide();
            }
        };

        // Example usage when submitting a form with file input
        document.getElementById('upload-form').addEventListener('submit', function (event) {
            event.preventDefault();
            const fileInput = document.getElementById('file-input');
            if (fileInput.files.length === 0) {
                alert("Please select a file.");
            } else {
                uploadFile(fileInput);
            }
        });
    </script>
</body>

</html>
