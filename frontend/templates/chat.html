<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc 2 Me - Medical Chat</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.3);
            --user-bubble: #22c55e;
            --bot-bubble: #f1f5f9;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* Navigation Bar */
        .navbar-custom {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            margin: 0 10px;
        }

        .nav-link.active {
            color: var(--primary) !important;
        }

        /* Main Container */
        .chat-wrapper {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            height: calc(100vh - 160px);
            display: flex;
            flex-direction: column;
        }

        .chat-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .chat-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .chat-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .chat-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Chat History */
        .chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar {
            width: 6px;
        }

        .chat-history::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: var(--user-bubble);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.15);
        }

        .bot-message {
            background: var(--bot-bubble);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 1rem;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .message-input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.03);
            border: 2px solid transparent;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .message-input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .action-btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: var(--text-muted);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .speak-btn.active {
            color: var(--primary);
            background: rgba(34, 197, 94, 0.1);
        }

        .typing-indicator {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            padding-left: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Doc 2 Me</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item active">
                        <a class="nav-link" href="/">Home<span class="sr-only">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/reports">Report</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jargon">Expert Review</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/text">Text</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/chat">Chat</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="chat-wrapper">
        <div class="chat-card">
            <div class="chat-header">
                <h1>Medical Chat</h1>
                <p>Private, AI-powered healthcare assistance</p>
            </div>

            <div class="chat-history" id="chat-container">
                <!-- Messages populate here -->
            </div>

            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                Bot is typing
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="input-area">
                <button class="action-btn speak-btn" id="speak-icon" title="Speak Response">
                    <i class="fas fa-volume-up"></i>
                </button>
                <input type="text" id="user-input" class="message-input"
                    placeholder="Ask about symptoms, terms, or procedures...">
                <button class="action-btn send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        function addMessage(message, type) {
            const chatContainer = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            messageDiv.innerHTML = message;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage(message) {
            try {
                addMessage(message, 'user-message');
                document.getElementById('typing-indicator').style.display = 'flex';

                const response = await fetch('/chat-interaction/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                if (!response.ok) throw new Error('Network response was not ok');

                document.getElementById('typing-indicator').style.display = 'none';

                const chatContainer = document.getElementById('chat-container');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message bot-message';
                chatContainer.appendChild(messageDiv);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let botFullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    botFullResponse += decoder.decode(value, { stream: true });
                    messageDiv.innerHTML = marked.parse(botFullResponse);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
                document.getElementById('typing-indicator').style.display = 'none';
            }
        }

        async function speak() {
            const speakIcon = document.getElementById('speak-icon');
            const messages = document.querySelectorAll('.bot-message');
            if (messages.length === 0) return;

            const lastBotMessage = messages[messages.length - 1].textContent;

            try {
                speakIcon.classList.add('active');
                speakIcon.style.pointerEvents = 'none';

                const response = await fetch('/translate-and-speak/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: lastBotMessage }),
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const audioData = await response.blob();
                const audio = new Audio(URL.createObjectURL(audioData));
                audio.play();

                audio.onended = () => {
                    speakIcon.classList.remove('active');
                    speakIcon.style.pointerEvents = 'auto';
                };
            } catch (error) {
                console.error(error);
                speakIcon.classList.remove('active');
                speakIcon.style.pointerEvents = 'auto';
            }
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (message) {
                sendMessage(message);
                input.value = '';
            }
        });

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });

        document.getElementById('speak-icon').addEventListener('click', speak);

        sendMessage('Hello');
    </script>
</body>

</html>
